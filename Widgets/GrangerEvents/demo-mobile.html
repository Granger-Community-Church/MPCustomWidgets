<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>GrangerEvents Mobile Widget</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
      /* ── Reset & base ── */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: Poppins, -apple-system, BlinkMacSystemFont, sans-serif;
        background: #f5f5f5;
        color: #333;
        -webkit-font-smoothing: antialiased;
        -webkit-tap-highlight-color: transparent;
      }

      /* ── Card list ── */
      .gem-container { padding: 1rem; }
      .gem-list { display: flex; flex-direction: column; gap: 1.25rem; }

      .gem-card {
        background: #fff;
        border-radius: 14px;
        overflow: hidden;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
        box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        transition: box-shadow 0.2s;
      }
      .gem-card:active { box-shadow: 0 1px 2px rgba(0,0,0,0.06); }

      .gem-card-img {
        width: 100%;
        aspect-ratio: 16 / 9;
        overflow: hidden;
        background: #e0e0e0;
      }
      .gem-card-img img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .gem-card-img-fallback {
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #e0e0e0, #ccc);
      }

      .gem-card-body {
        padding: 0.875rem 1rem 1rem;
      }
      .gem-title {
        font-size: 1.25rem;
        font-weight: 700;
        color: #222;
        line-height: 1.3;
        margin-bottom: 0.2rem;
      }
      .gem-card-datetime {
        font-size: 0.875rem;
        color: #888;
        line-height: 1.4;
      }

      /* ── Bottom sheet backdrop ── */
      .gem-sheet-backdrop {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0, 0, 0, 0.4);
        z-index: 9998;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
      }
      .gem-sheet-backdrop.gem-active {
        opacity: 1;
        pointer-events: auto;
      }

      /* ── Bottom sheet ── */
      .gem-sheet {
        position: fixed;
        left: 0; right: 0; bottom: 0;
        z-index: 9999;
        background: #fff;
        border-radius: 16px 16px 0 0;
        max-height: 90vh;
        transform: translateY(100%);
        transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
        display: flex;
        flex-direction: column;
        box-shadow: 0 -4px 30px rgba(0,0,0,0.15);
        padding-bottom: env(safe-area-inset-bottom, 0);
      }
      .gem-sheet.gem-active {
        transform: translateY(0);
      }
      .gem-sheet.gem-dragging {
        transition: none;
      }

      .gem-sheet-handle {
        width: 36px;
        height: 5px;
        background: #d0d0d0;
        border-radius: 3px;
        margin: 10px auto 0;
        flex-shrink: 0;
      }

      .gem-sheet-content {
        flex: 1;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        overscroll-behavior: contain;
      }

      /* ── Detail view inside sheet ── */
      .gem-detail { display: none; }
      .gem-detail.gem-visible { display: block; }

      .gem-detail-img {
        width: 100%;
        aspect-ratio: 16 / 9;
        object-fit: cover;
        display: block;
      }
      .gem-detail-body {
        padding: 1.25rem 1.25rem 2rem;
      }
      .gem-detail-title {
        font-size: 1.375rem;
        font-weight: 700;
        color: #092c4c;
        line-height: 1.3;
        margin-bottom: 0.75rem;
      }
      .gem-detail-meta {
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
        margin-bottom: 1rem;
        padding-bottom: 1rem;
        border-bottom: 1px solid #eee;
      }
      .gem-detail-datetime {
        font-size: 0.9375rem;
        color: #555;
        font-weight: 500;
      }
      .gem-detail-loc {
        font-size: 0.875rem;
        color: #777;
      }
      .gem-detail-desc {
        font-size: 0.9375rem;
        line-height: 1.65;
        color: #444;
      }
      .gem-detail-desc p { margin-bottom: 0.75rem; }
      .gem-detail-desc p:last-child { margin-bottom: 0; }

      .gem-register {
        display: block;
        margin-top: 1.25rem;
        padding: 14px 24px;
        background: #333;
        color: #fff;
        text-decoration: none;
        border-radius: 10px;
        font-weight: 600;
        font-size: 1rem;
        text-align: center;
        letter-spacing: 0.02em;
        transition: background 0.2s;
      }
      .gem-register:active { background: #2c9fa1; }
    </style>
  </head>

  <body>

    <div id="GrangerEventsMobile"
        data-component="CustomWidget"
        data-sp="api_Custom_GetRegistrationEvents"
        data-template="/Widgets/GrangerEvents/Template/GrangerEventsMobile.html"
        data-requireUser="false"
        data-cache="false"
        data-register-url="/mp-events/event/"
        data-debug="true"
        data-host="grangerchurch"></div>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/gh/Granger-Community-Church/MPCustomWidgets@main/dist/js/customWidgetV1.js"></script>

    <script>
    // --- Date formatting utilities (shared with web version) ---
    function geParse(isoStr) {
      if (!isoStr) return null;
      var cleaned = String(isoStr).replace(/\.?\d*Z$/, '').replace(/[+-]\d{2}:\d{2}$/, '');
      var d = new Date(cleaned + 'Z');
      if (isNaN(d.getTime())) return null;
      return d;
    }

    function geFormatDate(isoStr, options) {
      var d = geParse(isoStr);
      if (!d) return '';
      return new Intl.DateTimeFormat('en-US', Object.assign({}, options, { timeZone: 'UTC' })).format(d);
    }

    function geFormatTime(isoStr) {
      var d = geParse(isoStr);
      if (!d) return '';
      var h = d.getUTCHours(), m = d.getUTCMinutes();
      var hour12 = h % 12 || 12;
      var period = h < 12 ? 'a.m.' : 'p.m.';
      return m === 0 ? hour12 + ' ' + period : hour12 + ':' + String(m).padStart(2, '0') + ' ' + period;
    }

    function geFormatTimeRange(startIso, endIso) {
      var ds = geParse(startIso), de = geParse(endIso);
      if (!ds || !de) return geFormatTime(startIso);
      var sH = ds.getUTCHours(), sM = ds.getUTCMinutes();
      var eH = de.getUTCHours(), eM = de.getUTCMinutes();
      var sHour12 = sH % 12 || 12, eHour12 = eH % 12 || 12;
      var sPeriod = sH < 12 ? 'a.m.' : 'p.m.';
      var ePeriod = eH < 12 ? 'a.m.' : 'p.m.';
      var sTime = sM === 0 ? String(sHour12) : sHour12 + ':' + String(sM).padStart(2, '0');
      var eTime = eM === 0 ? String(eHour12) : eHour12 + ':' + String(eM).padStart(2, '0');
      return sPeriod === ePeriod
        ? sTime + '-' + eTime + ' ' + ePeriod
        : sTime + ' ' + sPeriod + '-' + eTime + ' ' + ePeriod;
    }

    // Format card-level compact datetime: "Apr 2, 5 p.m." or "Apr 2-3"
    function gemFormatCardDatetime(el) {
      var start = el.getAttribute('data-start');
      var end = el.getAttribute('data-end');
      var startYmd = start ? start.slice(0, 10) : '';
      var endYmd = end ? end.slice(0, 10) : '';

      if (end && endYmd !== startYmd) {
        // Multi-day
        var startStr = geFormatDate(start, { month: 'short', day: 'numeric' });
        var endStr = geFormatDate(end, { month: 'short', day: 'numeric' });
        el.textContent = startStr + ' \u2013 ' + endStr;
      } else {
        // Single day
        el.textContent = geFormatDate(start, { weekday: 'short', month: 'short', day: 'numeric' }) +
          ', ' + geFormatTime(start);
      }
    }

    // Format detail-level full datetime
    function gemFormatDetailDatetime(el) {
      var start = el.getAttribute('data-start');
      var end = el.getAttribute('data-end');
      var startYmd = start ? start.slice(0, 10) : '';
      var endYmd = end ? end.slice(0, 10) : '';

      if (end && endYmd !== startYmd) {
        el.textContent =
          geFormatDate(start, { weekday: 'long', month: 'long', day: 'numeric' }) + ', ' +
          geFormatTime(start) + ' to ' +
          geFormatDate(end, { weekday: 'long', month: 'long', day: 'numeric' }) + ', ' +
          geFormatTime(end);
      } else if (end) {
        el.textContent =
          geFormatDate(start, { weekday: 'long', month: 'long', day: 'numeric' }) + ', ' +
          geFormatTimeRange(start, end);
      } else {
        el.textContent =
          geFormatDate(start, { weekday: 'long', month: 'long', day: 'numeric' }) + ', ' +
          geFormatTime(start);
      }
    }

    // --- Bottom sheet logic ---
    function gemInitSheet(container) {
      var backdrop = container.querySelector('[id^="gem-backdrop"]');
      var sheet = container.querySelector('[id^="gem-sheet"]');
      var sheetContent = container.querySelector('[id^="gem-sheet-content"]');
      var handle = sheet.querySelector('.gem-sheet-handle');
      if (!sheet || !backdrop) return;

      var startY = 0;
      var currentY = 0;
      var isDragging = false;

      function openSheet(eventId) {
        // Hide all details, show the one we want
        sheet.querySelectorAll('.gem-detail').forEach(function(d) {
          d.classList.remove('gem-visible');
        });
        var detail = document.getElementById('gem-detail-' + eventId);
        if (detail) detail.classList.add('gem-visible');

        // Reset scroll
        sheetContent.scrollTop = 0;

        // Open
        backdrop.classList.add('gem-active');
        sheet.classList.add('gem-active');
        sheet.style.transform = '';
        document.body.style.overflow = 'hidden';
      }

      function closeSheet() {
        backdrop.classList.remove('gem-active');
        sheet.classList.remove('gem-active');
        sheet.classList.remove('gem-dragging');
        sheet.style.transform = '';
        document.body.style.overflow = '';
      }

      // Card tap -> open sheet
      container.querySelectorAll('.gem-card').forEach(function(card) {
        card.addEventListener('click', function(e) {
          e.preventDefault();
          openSheet(card.getAttribute('data-event-id'));
        });
      });

      // Backdrop tap -> close
      backdrop.addEventListener('click', closeSheet);

      // Drag-to-dismiss on the handle and sheet top area
      function onTouchStart(e) {
        // Only drag from handle or when scrolled to top
        if (e.target !== handle && e.target !== sheet && sheetContent.scrollTop > 0) return;
        isDragging = true;
        startY = e.touches[0].clientY;
        currentY = 0;
        sheet.classList.add('gem-dragging');
      }

      function onTouchMove(e) {
        if (!isDragging) return;
        var dy = e.touches[0].clientY - startY;
        // Only allow dragging down
        if (dy < 0) dy = 0;
        currentY = dy;
        sheet.style.transform = 'translateY(' + dy + 'px)';
      }

      function onTouchEnd() {
        if (!isDragging) return;
        isDragging = false;
        sheet.classList.remove('gem-dragging');
        // If dragged more than 30% of sheet height, close it
        if (currentY > sheet.offsetHeight * 0.3) {
          closeSheet();
        } else {
          sheet.style.transform = '';
        }
      }

      sheet.addEventListener('touchstart', onTouchStart, { passive: true });
      sheet.addEventListener('touchmove', onTouchMove, { passive: true });
      sheet.addEventListener('touchend', onTouchEnd);
    }

    // --- Widget initialization ---
    window.addEventListener('widgetLoaded', function(e) {
      var container = document.getElementById(e.detail.widgetId);
      if (!container) return;

      var list = container.querySelector('[id^="gem-list"]');
      if (!list) return; // Not a mobile events widget

      // Format dates
      try {
        container.querySelectorAll('.gem-card-datetime[data-start]').forEach(gemFormatCardDatetime);
        container.querySelectorAll('.gem-detail-datetime[data-start]').forEach(gemFormatDetailDatetime);
      } catch (err) {
        console.error('Date formatting error:', err);
      }

      // Rewrite register links if a custom base URL is provided
      var registerUrl = container.getAttribute('data-register-url');
      if (registerUrl) {
        container.querySelectorAll('.gem-register[data-event-id]').forEach(function(link) {
          link.href = registerUrl + '?id=' + link.getAttribute('data-event-id');
        });
      }

      // Sort cards by date ascending
      var cards = Array.from(list.querySelectorAll('.gem-card'));
      cards.sort(function(a, b) {
        return (a.getAttribute('data-sort') || '').localeCompare(b.getAttribute('data-sort') || '');
      });
      cards.forEach(function(card) { list.appendChild(card); });

      // Init bottom sheet
      gemInitSheet(container);
    });
    </script>
  </body>
</html>
